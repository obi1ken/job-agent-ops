# Portal Scanner Configuration — Charles Asiegbu
# Generated: 2026-04-24
# UK-curated for 4-track search (A=Engineering, B=Product, C=Rail/Civils, D=DocControl)
#
# Strategy:
#   1. Playwright → careers_url of each tracked company (real-time)
#   2. Greenhouse API → structured JSON (fast, Greenhouse-only)
#   3. WebSearch with site: filters (broad discovery)
#
# Profile portals (CV stored):
#   LinkedIn → Track B | Indeed → Track B | Reed → Track D
#   Totaljobs → Track C | CWJobs → Track A | RailwayPeople → Track C
#
# Search-only (no profile stored):
#   Adzuna API (100+ UK boards) | Google Jobs via SerpAPI

# -- Title filter --
# At least 1 positive must match AND 0 negatives must match.

title_filter:
  positive:
    # Track A — Engineering / AI
    - "AI Agent"
    - "AI Engineer"
    - "AI Infrastructure"
    - "Autonomous"
    - "LLM"
    - "MLOps"
    - "LLMOps"
    - "Agentic"
    - "GenAI"
    - "Generative AI"
    - "Founding Engineer"
    - "Platform Engineer"
    - "Solutions Architect"
    - "Solutions Engineer"
    - "ML Engineer"
    # Track B — Product / Leadership
    - "Product Manager"
    - "Technical PM"
    - "Head of AI"
    - "AI Product"
    - "AI Delivery"
    - "Transformation Lead"
    # Track C — Rail / Civils Digital
    - "Digital Transformation"
    - "BIM"
    - "Rail"
    - "Railway"
    - "Infrastructure"
    - "Civils"
    - "Safety Technology"
    - "AI Implementation"
    - "Technology Consultant"
    # Track D — Document Control
    - "Document Controller"
    - "Document Control"
    - "Information Manager"
    - "Information Management"
    - "Records Manager"
    - "BIM Information"
    - "EDMS"
  negative:
    - "Junior"
    - "Graduate"
    - "Intern"
    - "Apprentice"
    - "iOS"
    - "Android"
    - "PHP"
    - "Ruby"
    - "Embedded"
    - "Firmware"
    - "FPGA"
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "COBOL"
    - "Mainframe"
  seniority_boost:
    - "Senior"
    - "Lead"
    - "Principal"
    - "Head"
    - "Director"
    - "Staff"

# -- Search queries --
# UK portals — profile stored (Track noted per portal)

search_queries:

  # -- CWJobs (Track A — Engineering/AI) --
  - name: CWJobs — AI Agent Engineer
    query: 'site:cwjobs.co.uk "AI Agent" OR "AI Engineer" OR "MLOps" OR "LLMOps" OR "Autonomous" UK'
    enabled: true

  - name: CWJobs — Founding Engineer
    query: 'site:cwjobs.co.uk "Founding Engineer" OR "AI Infrastructure" OR "Agentic" UK'
    enabled: true

  # -- LinkedIn (Track B — Product/Leadership) --
  - name: LinkedIn — AI Product Manager UK
    query: 'site:linkedin.com/jobs "AI Product Manager" OR "Head of AI" OR "Technical PM" UK'
    enabled: true

  - name: LinkedIn — AI Delivery Lead UK
    query: 'site:linkedin.com/jobs "AI Delivery" OR "Transformation Lead" OR "Solutions Engineer" AI UK'
    enabled: true

  # -- Indeed UK (all tracks — auto-detect) --
  - name: Indeed UK — Track A Engineering
    query: 'site:uk.indeed.com "AI Engineer" OR "MLOps" OR "AI Agent" OR "Founding Engineer"'
    enabled: true

  - name: Indeed UK — Track B Product
    query: 'site:uk.indeed.com "AI Product Manager" OR "Head of AI" OR "Technical Product Manager"'
    enabled: true

  - name: Indeed UK — Track C Rail Digital
    query: 'site:uk.indeed.com "Digital Transformation" rail OR civils OR infrastructure "Project Manager" OR "Consultant"'
    enabled: true

  - name: Indeed UK — Track D Document Control
    query: 'site:uk.indeed.com "Document Controller" OR "Information Manager" rail OR civils OR construction'
    enabled: true

  # -- Reed (Track D — Document Control) --
  - name: Reed — Document Controller rail/civils
    query: 'site:reed.co.uk "Document Controller" OR "Information Manager" OR "EDMS" rail OR civils OR construction OR infrastructure'
    enabled: true

  - name: Reed — BIM Information Manager
    query: 'site:reed.co.uk "BIM Information Manager" OR "BIM Manager" OR "Digital Information Manager"'
    enabled: true

  # -- Totaljobs (Track C — Rail/Civils Digital) --
  - name: Totaljobs — Rail Digital Transformation
    query: 'site:totaljobs.com "Digital Transformation" rail OR infrastructure OR civils "Project Manager" OR "Consultant" OR "BIM"'
    enabled: true

  - name: Totaljobs — AI Implementation rail/civils
    query: 'site:totaljobs.com "AI Implementation" OR "Safety Technology" OR "Technology Consultant" rail OR infrastructure'
    enabled: true

  # -- RailwayPeople (Track C — specialist rail) --
  - name: RailwayPeople — Digital / Technology roles
    query: 'site:railwaypeople.com "Digital" OR "Technology" OR "BIM" OR "AI" OR "Data" "Manager" OR "Consultant" OR "Engineer"'
    enabled: true

  - name: RailwayPeople — COSS / Safety / Operations
    query: 'site:railwaypeople.com "COSS" OR "Protection Controller" OR "Site Safety" OR "Possession" OR "Safety Manager"'
    enabled: true

  # -- Adzuna (search-only, no profile — API key required) --
  # Configure ADZUNA_APP_ID and ADZUNA_API_KEY in .env
  - name: Adzuna — All tracks UK
    query: 'AI Engineer OR Document Controller OR Digital Transformation OR "Product Manager" UK full-time'
    enabled: false   # enable once Adzuna API keys configured in .env
    notes: "Aggregates 100+ UK boards. Filter: UK, full-time, salary > £35,000."

  # -- Google Jobs via SerpAPI (search-only, no profile) --
  # Configure SERPAPI_KEY in .env
  - name: SerpAPI Google Jobs — Track A Engineering
    query: '"AI Agent Engineer" OR "Founding Engineer" OR "AI Infrastructure" UK'
    enabled: false   # enable once SERPAPI_KEY configured in .env

  - name: SerpAPI Google Jobs — Track C Rail Digital
    query: '"Digital Railway" OR "Rail Technology" OR "BIM Digital" "Project Manager" OR "Consultant" UK'
    enabled: false

  # -- Greenhouse / Ashby / Lever — direct ATS searches --
  - name: Greenhouse — AI Engineer UK/EU
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "AI Engineer" OR "ML Engineer" OR "LLM" UK OR London OR Remote'
    enabled: true

  - name: Ashby — AI / Founding Engineer
    query: 'site:jobs.ashbyhq.com "AI Engineer" OR "Founding Engineer" OR "Agentic" OR "LLM" remote OR London'
    enabled: true

  - name: Lever — AI / Solutions roles
    query: 'site:jobs.lever.co "AI Engineer" OR "Solutions Architect" OR "Forward Deployed" remote OR London'
    enabled: true

